services:
  # Servicio de la API Servitel Showcase
  app:
    build:
      context: ../backend
      dockerfile: ../backend/Dockerfile
    container_name: servitel_api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../backend:/var/www
    networks:
      - app-network
    depends_on:
      - db

  # Servicio de Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
    volumes:
      - ../data/mysql:/var/lib/mysql
      - ../data/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    ports:
      - "3306:3306"
  
  # Proxy para comunicación via HTTP o HTTPS
  web:
    image: nginx:alpine
    container_name: servitel_nginx
    ports:
      - "8080:80"
    networks:
      - app-network
    volumes:
      - ../backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

networks:
  app-network:
    driver: bridge