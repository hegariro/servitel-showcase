services:
  # Servicio de la API Servitel Showcase
  app:
    build:
      context: ../backend
      dockerfile: ../backend/Dockerfile
    container_name: servitel_api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../backend:/var/www
    networks:
      - app-network
    depends_on:
      - db
    ports:
      - "8080:8080"

  # Servicio de Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
    volumes:
      - ../data/mysql:/var/lib/mysql
      - ../data/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    ports:
      - "3306:3306"

networks:
  app-network:
    driver: bridge